name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  widget_app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widget-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
